spring:
  application:
    name: nextcharge-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nextcharge}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Custom JWT configuration
app:
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3e7b1a6c5d9f0e1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 Hours
  storage:
    type: ${STORAGE_TYPE:local} # local or s3
    local-dir: ${STORAGE_LOCAL_DIR:uploads}
    s3:
      bucket: ${AWS_S3_BUCKET:nextcharge-assets}
      region: ${AWS_REGION:ap-south-1}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
